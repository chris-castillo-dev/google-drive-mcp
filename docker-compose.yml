services:
  google-drive-mcp:
    build:
      context: .
      dockerfile: Dockerfile.propel
    image: google-drive-mcp:latest
    container_name: google-drive-mcp
    environment:
      - NODE_ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
      - ./gcp-oauth.keys.json:/config/gcp-oauth.keys.json:ro
      - ./tokens.json:/config/tokens.json
    ports:
      - "3004:8000"
    healthcheck:
      test: ["CMD", "node", "healthcheck.cjs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
